name: CI — Build, Test & Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/microservice_inventory_management

jobs:
  # ── Lint & Type Check ──────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, inventory-service, orders-service, reporting-service, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install service dependencies
        run: npm ci
        working-directory: services/${{ matrix.service }}

      - name: Generate Prisma client
        run: |
          if [ -f "prisma/schema.prisma" ]; then
            npx prisma generate
          fi
        working-directory: services/${{ matrix.service }}

      - name: Type check
        run: npx tsc --noEmit
        working-directory: services/${{ matrix.service }}

  # ── Auth Service Tests ─────────────────────────────────────
  test-auth:
    name: Test — auth-service
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        working-directory: services/auth-service

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: services/auth-service
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/auth_db

      - name: Push schema
        run: npx prisma db push --skip-generate
        working-directory: services/auth-service
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/auth_db

      - name: Start auth-service
        run: |
          npm run build
          node dist/index.js &
          sleep 5
        working-directory: services/auth-service
        env:
          PORT: 3001
          DATABASE_URL: postgresql://postgres:password@localhost:5432/auth_db
          JWT_ACCESS_SECRET: test_access_secret_ci
          JWT_REFRESH_SECRET: test_refresh_secret_ci
          REDIS_URL: redis://localhost:6379

      - name: Run auth tests
        run: npm run test
        working-directory: services/auth-service
        env:
          AUTH_URL: http://localhost:3001

  # ── Build Docker Images ────────────────────────────────────
  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'

    strategy:
      matrix:
        include:
          - service: auth-service
            context: services/auth-service
          - service: inventory-service
            context: services/inventory-service
          - service: orders-service
            context: services/orders-service
          - service: reporting-service
            context: services/reporting-service
          - service: api-gateway
            context: services/api-gateway
          - service: admin-dashboard
            context: services/admin-dashboard

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Smoke Test (integration) ───────────────────────────────
  smoke-test:
    name: Smoke Test — Full Stack
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: |
          sudo docker compose -f infra/docker/docker-compose.yml up -d
          echo "Waiting 60s for all services..."
          sleep 60

      - name: Push schemas
        run: |
          sudo docker exec docker-auth-service-1 npx prisma db push --skip-generate || true
          sudo docker exec docker-inventory-db-1 psql -U postgres -d inventory_db -c "
            CREATE TABLE IF NOT EXISTS \"Warehouse\" (id TEXT PRIMARY KEY DEFAULT gen_random_uuid()::text, name TEXT NOT NULL, location TEXT NOT NULL, \"createdAt\" TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP);
            CREATE TABLE IF NOT EXISTS \"Product\" (id TEXT PRIMARY KEY DEFAULT gen_random_uuid()::text, name TEXT NOT NULL, sku TEXT NOT NULL UNIQUE, description TEXT, price DECIMAL(10,2) NOT NULL, category TEXT, \"createdAt\" TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP, \"updatedAt\" TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP);
            CREATE TABLE IF NOT EXISTS \"Stock\" (id TEXT PRIMARY KEY DEFAULT gen_random_uuid()::text, \"productId\" TEXT NOT NULL REFERENCES \"Product\"(id) ON DELETE CASCADE, \"warehouseId\" TEXT NOT NULL REFERENCES \"Warehouse\"(id) ON DELETE CASCADE, quantity INTEGER NOT NULL DEFAULT 0, reserved INTEGER NOT NULL DEFAULT 0, \"updatedAt\" TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP, UNIQUE(\"productId\", \"warehouseId\"));
            CREATE TABLE IF NOT EXISTS \"StockAlert\" (id TEXT PRIMARY KEY DEFAULT gen_random_uuid()::text, \"productId\" TEXT NOT NULL REFERENCES \"Product\"(id) ON DELETE CASCADE, threshold INTEGER NOT NULL, \"currentStock\" INTEGER NOT NULL DEFAULT 0, \"triggeredAt\" TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP);
          " || true
          sudo docker exec docker-orders-service-1 npx prisma db push --skip-generate || true
          sudo docker restart docker-inventory-service-1 docker-orders-service-1 docker-reporting-service-1 || true
          sleep 15

      - name: Run smoke tests
        run: bash docs/smoke-test.sh

      - name: Show logs on failure
        if: failure()
        run: |
          sudo docker compose -f infra/docker/docker-compose.yml logs --tail=50

  # ── Summary ────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test-auth, build]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth Service Tests | ${{ needs.test-auth.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
