apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
  namespace: invenflow
  labels:
    app: reporting-service
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reporting-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: reporting-service
        version: "1.0"
    spec:
      containers:
        - name: reporting-service
          image: your-registry/reporting-service:latest
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: invenflow-config
                  key: REPORTING_PORT
            - name: ELASTICSEARCH_URL
              valueFrom:
                configMapKeyRef:
                  name: invenflow-config
                  key: ELASTICSEARCH_URL
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: invenflow-config
                  key: KAFKA_BROKER
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: invenflow-config
                  key: AUTH_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 40
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: reporting-service
  namespace: invenflow
spec:
  selector:
    app: reporting-service
  ports:
    - port: 3004
      targetPort: 3004
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reporting-service-hpa
  namespace: invenflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reporting-service
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
