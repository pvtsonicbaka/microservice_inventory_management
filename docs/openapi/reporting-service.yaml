openapi: 3.0.3
info:
  title: Reporting Service API
  version: 1.0.0

security:
  - bearerAuth: []

paths:
  /search/products:
    get:
      summary: Full-text product search (Elasticsearch)
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: minPrice
          schema: { type: number }
        - in: query
          name: maxPrice
          schema: { type: number }
        - in: query
          name: inStock
          schema: { type: boolean }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  hits: { type: integer }
                  results:
                    type: array
                    items: { $ref: "#/components/schemas/SearchResult" }
                  facets:
                    type: object
                    properties:
                      categories:
                        type: array
                        items:
                          type: object
                          properties:
                            key: { type: string }
                            count: { type: integer }

  /reports/stock:
    get:
      summary: Current stock levels across all products
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalProducts: { type: integer }
                  lowStockCount: { type: integer }
                  outOfStockCount: { type: integer }
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        productId: { type: string }
                        name: { type: string }
                        stock: { type: integer }
                        status: { type: string, enum: [OK, LOW, OUT] }

  /reports/orders:
    get:
      summary: Order analytics
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalOrders: { type: integer }
                  totalRevenue: { type: number }
                  byStatus:
                    type: object
                    additionalProperties: { type: integer }
                  dailyTrend:
                    type: array
                    items:
                      type: object
                      properties:
                        date: { type: string }
                        orders: { type: integer }
                        revenue: { type: number }

  /reports/dashboard:
    get:
      summary: Admin dashboard summary
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SearchResult:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        sku: { type: string }
        price: { type: number }
        category: { type: string }
        stock: { type: integer }
        score: { type: number }

    DashboardSummary:
      type: object
      properties:
        totalProducts: { type: integer }
        totalOrders: { type: integer }
        revenueToday: { type: number }
        lowStockAlerts: { type: integer }
        recentOrders:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              status: { type: string }
              total: { type: number }
              createdAt: { type: string }
