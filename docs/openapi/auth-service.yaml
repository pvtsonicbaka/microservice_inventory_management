openapi: 3.0.3
info:
  title: Auth Service API
  version: 1.0.0

paths:
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                name: { type: string }
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409": { description: Email already exists }

  /auth/login:
    post:
      summary: Login and get JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401": { description: Invalid credentials }

  /auth/refresh:
    post:
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken: { type: string }
        "401": { description: Invalid or expired refresh token }

  /auth/logout:
    post:
      summary: Logout (blacklist token)
      security:
        - bearerAuth: []
      responses:
        "204": { description: Logged out }

  /auth/validate:
    get:
      summary: Validate JWT (used by API Gateway internally)
      security:
        - bearerAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPayload"
        "401": { description: Invalid token }

  /auth/users/{id}/role:
    patch:
      summary: Update user role (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [admin, manager, viewer]
      responses:
        "200": { description: Role updated }
        "403": { description: Forbidden }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        user:
          type: object
          properties:
            id: { type: string, format: uuid }
            email: { type: string }
            name: { type: string }
            role: { type: string, enum: [admin, manager, viewer] }

    TokenPayload:
      type: object
      properties:
        sub: { type: string }
        email: { type: string }
        role: { type: string }
        iat: { type: integer }
        exp: { type: integer }
